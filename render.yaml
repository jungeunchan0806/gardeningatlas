services:
  - type: web
    name: gardeningatlas
    env: node
    buildCommand: npm ci
    startCommand: npm start
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: DATA_DIR
        value: /var/data
      - key: PUBLIC_BASE_URL
        sync: false
    disk:
      name: gardeningatlas-data
      mountPath: /var/data
      sizeGB: 1
